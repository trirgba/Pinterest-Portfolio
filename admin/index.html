<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập Admin — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/webp" sizes="32x32" href="https://res.cloudinary.com/dft21ara1/image/upload/c_scale,w_32/v1781341495/Favicon_irrmrx.webp">
  <link rel="icon" type="image/webp" sizes="192x192" href="https://res.cloudinary.com/dft21ara1/image/upload/c_scale,w_192/v1781341495/Favicon_irrmrx.webp">
  <link rel="apple-touch-icon" sizes="180x180" href="https://res.cloudinary.com/dft21ara1/image/upload/c_scale,w_180/v1781341495/Favicon_irrmrx.webp">
</head>
<body>
  <div class="admin-login-container">
    <div class="admin-login-card animate-fade-in-scale">
      <h1>Đăng nhập Admin</h1>
      <p>Chỉ những email được cho phép mới có thể truy cập.</p>
      
      <div class="admin-code-group">
        <input type="password" id="input-admin-code" placeholder="Nhập Admin Code..." autocomplete="off">
        <button id="btn-code-login" class="btn-code-enter" title="Đăng nhập">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 10 4 15 9 20"></polyline>
            <path d="M20 4v7a4 4 0 0 1-4 4H4"></path>
          </svg>
        </button>
      </div>

      <div class="login-divider">
        <span>Hoặc</span>
      </div>

      <button id="btn-google-login" class="btn-google">
        <svg viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Đăng nhập bằng Google
      </button>

      <div id="login-error" style="display: none; margin-top: 16px; padding: 12px; border-radius: 10px; background: #fef2f2; color: #dc2626; font-size: 14px;"></div>
    </div>
  </div>

  <script type="module">
    import '../src/styles/main.css';
    import '../src/styles/admin.css';
    import { initLoginPage } from '../src/pages/login.js';
    initLoginPage();
  </script>
</body>
</html>
