<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chi tiết dự án — Mosaic Grid Gallery">
  <title>Project — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container" style="display: flex; align-items: center; gap: 16px;">
      <a href="/" id="back-btn" class="back-btn" aria-label="Quay lại">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>
      <div>
        <h1 id="project-title" class="project-detail-title">Đang tải...</h1>
        <span id="project-count" class="project-detail-count"></span>
      </div>
    </div>
  </header>

  <!-- Mosaic Grid -->
  <main class="container" style="padding-top: 24px; padding-bottom: 64px;">
    <div id="mosaic-grid" class="mosaic-grid"></div>
  </main>

  <!-- Footer SEO -->
  <footer style="text-align: center; padding: 40px 20px; border-top: 1px solid var(--color-border); margin-top: auto;">
    <div class="container">
      <p style="color: var(--color-text-muted); font-size: 14px; margin-bottom: 8px;">
        © 2026 <strong>Trí Xin Chào</strong> (Designer Nguyễn Minh Trí). All rights reserved.
      </p>
      <div style="display: flex; justify-content: center; gap: 16px; font-size: 14px;">
        <a href="https://www.linkedin.com/in/trixinchao/" target="_blank" rel="noopener noreferrer" style="color: var(--color-text); font-weight: 500; text-decoration: underline;">Trí Nguyễn LinkedIn</a>
        <a href="https://www.tringuyen.io.vn/" target="_blank" rel="noopener noreferrer" style="color: var(--color-text); font-weight: 500; text-decoration: underline;">Website Trí Nguyễn</a>
      </div>
    </div>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox-overlay">
    <button class="lightbox-close" aria-label="Đóng">✕</button>
    <img src="" alt="Full size">
  </div>

  <script type="module">
    import './src/main.js';
    import { initProjectPage } from './src/pages/project.js';
    initProjectPage();
  </script>
</body>
</html>
