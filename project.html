<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chi tiết dự án — Mosaic Grid Gallery">
  <title>Project — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container" style="display: flex; align-items: center; position: relative; min-height: 40px;">
      <!-- Left: Back button -->
      <a href="/" id="back-btn" class="back-btn" aria-label="Quay lại">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>

      <!-- Center: Title & Count -->
      <div style="position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; white-space: nowrap; font-size: 16px; font-weight: 500;">
        <h1 id="project-title" class="project-detail-title" style="margin: 0; font-size: inherit; font-weight: inherit;">Đang tải...</h1>
        <span id="project-count" class="project-detail-count" style="color: var(--color-text-muted); font-weight: 400; margin-left: 6px;"></span>
      </div>

      <!-- Right: Edit button (Admin only) -->
      <a href="#" id="edit-project-btn" class="back-btn" aria-label="Chỉnh sửa" style="display: none; margin-left: auto;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
        </svg>
      </a>
    </div>
  </header>

  <!-- Mosaic Grid -->
  <main class="container" style="padding-top: 24px; padding-bottom: 64px;">
    <div id="mosaic-grid" class="mosaic-grid"></div>
  </main>

  <!-- Footer SEO -->
  <footer style="text-align: center; padding: 40px 20px; border-top: 1px solid var(--color-border); margin-top: auto;">
    <div class="container">
      <p style="color: var(--color-text-muted); font-size: 14px; margin-bottom: 8px;">
        © 2026 <strong>Trí Xin Chào</strong> (Designer Nguyễn Minh Trí). All rights reserved.
      </p>
      <div style="display: flex; justify-content: center; gap: 16px; font-size: 14px;">
        <a href="https://www.linkedin.com/in/trixinchao/" target="_blank" rel="noopener noreferrer" aria-label="Trí Nguyễn LinkedIn" title="Trí Nguyễn LinkedIn" style="color: var(--color-text-muted); transition: color 0.2s;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z" /><path d="M8 11l0 5" /><path d="M8 8l0 .01" /><path d="M12 16l0 -5" /><path d="M16 16v-3a2 2 0 0 0 -4 0" /></svg>
        </a>
        <a href="mailto:trixinchao@gmail.com" aria-label="Email Trí Nguyễn" title="Email Trí Nguyễn" style="color: var(--color-text-muted); transition: color 0.2s;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 7a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-10z" /><path d="M3 7l9 6l9 -6" /></svg>
        </a>
      </div>
    </div>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox-overlay">
    <button class="lightbox-close" aria-label="Đóng">✕</button>
    <img src="" alt="Full size">
  </div>

  <script type="module">
    import './src/main.js';
    import { initProjectPage } from './src/pages/project.js';
    initProjectPage();
  </script>
</body>
</html>
